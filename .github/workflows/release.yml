name: Release (Linux, macOS, Windows)

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build and release"
        required: true
        type: string

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0
          persist-credentials: false
      - name: Validate tag
        id: version
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          EXACT_TAG=$(git describe --tags --exact-match)
          if [ "$EXACT_TAG" != "$RELEASE_TAG" ]; then
            echo "::error::Checked out tag '$EXACT_TAG' does not match requested tag '$RELEASE_TAG'"
            exit 1
          fi
          echo "version=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  linux:
    name: Linux Release
    needs: validate
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Build Frontend (default)
        env:
          CI: ""
        run: |
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..
      - name: Build Frontend (classic)
        env:
          CI: ""
        run: |
          cd web
          bun install --filter ./classic --frozen-lockfile
          cd classic
          VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.1"
      - name: Build Backend (amd64)
        run: |
          go mod download
          go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION' -extldflags '-static'" -o new-api-$VERSION
      - name: Build Backend (arm64)
        run: |
          sudo apt-get update
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y gcc-aarch64-linux-gnu
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION' -extldflags '-static'" -o new-api-arm64-$VERSION
      - name: Generate checksums
        run: sha256sum new-api-* > checksums-linux.txt
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-linux
          path: |
            new-api-*
            checksums-linux.txt
          retention-days: 1

  macos:
    name: macOS Release
    needs: validate
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Build Frontend (default)
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..
      - name: Build Frontend (classic)
        env:
          CI: ""
        run: |
          cd web
          bun install --filter ./classic --frozen-lockfile
          cd classic
          VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.1"
      - name: Build Backend
        run: |
          go mod download
          go build -ldflags "-X 'new-api/common.Version=$VERSION'" -o new-api-macos-$VERSION
      - name: Generate checksums
        run: shasum -a 256 new-api-macos-* > checksums-macos.txt
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-macos
          path: |
            new-api-macos-*
            checksums-macos.txt
          retention-days: 1

  windows:
    name: Windows Release
    needs: validate
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    env:
      VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - name: Build Frontend (default)
        env:
          CI: ""
        run: |
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..
      - name: Build Frontend (classic)
        env:
          CI: ""
        run: |
          cd web
          bun install --filter ./classic --frozen-lockfile
          cd classic
          VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..
      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.25.1"
      - name: Build Backend
        run: |
          go mod download
          go build -ldflags "-s -w -X 'new-api/common.Version=$VERSION'" -o new-api-$VERSION.exe
      - name: Generate checksums
        run: sha256sum new-api-*.exe > checksums-windows.txt
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-windows
          path: |
            new-api-*.exe
            checksums-windows.txt
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [validate, linux, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      VERSION: ${{ needs.validate.outputs.version }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Publish release assets
        run: |
          if gh release view "$VERSION" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$VERSION" release/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$VERSION" release/* --verify-tag --title "New API $VERSION" --notes "" --repo "$GITHUB_REPOSITORY"
          fi
